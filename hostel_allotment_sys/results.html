<!DOCTYPE html>
<html class="dark" lang="en" dir="ltr">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <meta name="description" content="AllotmentPro - View previous hostel allocation results and reports."/>
  <meta name="theme-color" content="#121c2a"/>
  <title>Results | AllotmentPro</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "error": "#ba1a1a",
            "primary-fixed-dim": "#c3c0ff",
            "on-tertiary": "#ffffff",
            "secondary-fixed": "#7ffc97",
            "tertiary-container": "#885500",
            "surface-variant": "#464555",
            "on-primary-container": "#dad7ff",
            "on-secondary": "#ffffff",
            "secondary-fixed-dim": "#62df7d",
            "on-secondary-fixed-variant": "#005320",
            "surface-container": "#1e242d",
            "inverse-surface": "#f8f9ff",
            "surface-bright": "#3b434f",
            "surface-container-low": "#1a1c22",
            "primary-container": "#4f46e5",
            "secondary": "#62df7d",
            "inverse-primary": "#3525cd",
            "on-error-container": "#93000a",
            "tertiary-fixed-dim": "#ffb95f",
            "on-tertiary-fixed-variant": "#653e00",
            "on-error": "#ffffff",
            "background": "#121c2a",
            "surface-dim": "#0e141c",
            "primary": "#c3c0ff",
            "on-primary": "#0f0069",
            "on-surface": "#eaf1ff",
            "on-secondary-fixed": "#002109",
            "on-surface-variant": "#c7c4d8",
            "on-background": "#eaf1ff",
            "surface-container-high": "#27313f",
            "on-tertiary-container": "#ffd4a4",
            "surface-container-highest": "#364150",
            "surface-container-lowest": "#0b121a",
            "on-tertiary-fixed": "#2a1700",
            "tertiary-fixed": "#ffddb8",
            "tertiary": "#ffb95f",
            "primary-fixed": "#e2dfff",
            "secondary-container": "#005320",
            "on-primary-fixed-variant": "#3323cc",
            "on-primary-fixed": "#0f0069",
            "inverse-on-surface": "#121c2a",
            "error-container": "#93000a",
            "on-secondary-container": "#7cf994",
            "surface": "#121c2a",
            "outline-variant": "#464555",
            "surface-tint": "#c3c0ff",
            "outline": "#8e9099"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "lg": "24px",
            "md": "16px",
            "base": "4px",
            "xs": "8px",
            "container-margin": "16px",
            "xl": "32px",
            "gutter": "16px",
            "sm": "12px"
          },
          "fontFamily": {
            "body-sm": ["Inter"],
            "label-md": ["JetBrains Mono"],
            "body-lg": ["Inter"],
            "headline-lg": ["Plus Jakarta Sans"],
            "headline-md": ["Plus Jakarta Sans"],
            "headline-lg-mobile": ["Plus Jakarta Sans"],
            "mono-label": ["JetBrains Mono"]
          },
          "fontSize": {
            "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
            "label-md": ["13px", {"lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "600"}],
            "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
            "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "mono-label": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
          }
        },
      },
    }
  </script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .tech-font {
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.01em;
    }
    .alert {
      @apply px-md py-sm rounded-lg border text-body-sm;
    }
    .alert-info {
      @apply bg-primary-container/20 border-primary text-primary;
    }
    button:focus-visible,
    a:focus-visible {
      @apply outline-2 outline-offset-2 outline-primary;
    }
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-background text-on-background font-body-lg antialiased">
  <!-- TopAppBar -->
  <header class="w-full top-0 sticky z-50 bg-surface-container-lowest border-b border-outline-variant" role="banner">
    <div class="flex items-center justify-between px-lg h-16 w-full max-w-7xl mx-auto">
      <div class="flex items-center gap-xs">
        <span class="material-symbols-outlined text-primary" aria-hidden="true">apartment</span>
        <span class="font-headline-md text-headline-md text-primary font-bold tech-font tracking-tight">AllotmentPro</span>
      </div>
      <div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant ring-2 ring-primary/20" role="img" aria-label="User avatar">
        <img class="w-full h-full object-cover" alt="" src="https://api.dicebear.com/7.x/avataaars/svg?seed=user" loading="lazy"/>
      </div>
    </div>
  </header>

  <main class="max-w-xl mx-auto px-container-margin py-lg space-y-lg pb-32">
    <!-- Page Header -->
    <section class="space-y-xs">
      <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tech-font">Previous Results</h1>
      <p class="text-on-surface-variant font-body-sm">View and manage all previous hostel allocation runs.</p>
    </section>

    <!-- Empty State or Results List -->
    <div id="emptyState" class="space-y-md">
      <div class="alert alert-info">
        <span class="material-symbols-outlined text-sm align-middle mr-xs" aria-hidden="true">info</span>
        No allocation results saved yet. Start a new allocation from the home page.
      </div>
      
      <a href="index.html" 
         class="w-full bg-primary-container text-on-primary-container h-14 rounded-xl font-headline-md tech-font shadow-lg shadow-primary-container/20 active:scale-[0.98] transition-all flex items-center justify-center gap-xs hover:bg-primary-container/90 focus:outline-primary focus:outline-2 focus:outline-offset-2">
        <span class="material-symbols-outlined" aria-hidden="true">add</span>
        New Allocation
      </a>
    </div>

    <!-- Results List (Hidden by default) -->
    <div id="resultsList" class="hidden space-y-md"></div>
  </main>

  <!-- Bottom Navigation Shell -->
  <nav class="lg:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-container-margin py-xs bg-surface-container-lowest border-t border-outline-variant z-50" aria-label="Mobile navigation">
    <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-lg active:scale-90 focus:outline-primary focus:outline-2 focus:outline-offset-2" 
       href="index.html" 
       title="Home">
      <span class="material-symbols-outlined" aria-hidden="true">home</span>
      <span class="text-label-md font-label-md tech-font text-[10px]">Home</span>
    </a>
    <a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 active:scale-90 transition-transform focus:outline-primary focus:outline-2 focus:outline-offset-2" 
       href="results.html" 
       title="Results"
       aria-current="page">
      <span class="material-symbols-outlined" aria-hidden="true">list_alt</span>
      <span class="text-label-md font-label-md tech-font text-[10px]">Results</span>
    </a>
    <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-lg active:scale-90 focus:outline-primary focus:outline-2 focus:outline-offset-2" 
       href="#" 
       title="Settings">
      <span class="material-symbols-outlined" aria-hidden="true">settings</span>
      <span class="text-label-md font-label-md tech-font text-[10px]">Settings</span>
    </a>
  </nav>

  <script>
    /**
     * Results Page - Load and display previous allocation results
     */
    
    document.addEventListener('DOMContentLoaded', () => {
      const emptyState = document.getElementById('emptyState');
      const resultsList = document.getElementById('resultsList');

      // Try to load results from localStorage
      const savedResults = localStorage.getItem('allocationResults');
      
      if (savedResults) {
        try {
          const results = JSON.parse(savedResults);
          displayResults(results);
          emptyState.classList.add('hidden');
          resultsList.classList.remove('hidden');
        } catch (error) {
          console.error('Error parsing saved results:', error);
        }
      }
    });

    /**
     * Display results from localStorage
     */
    function displayResults(results) {
      const resultsList = document.getElementById('resultsList');
      resultsList.innerHTML = '';

      if (!results || !results.allotted) {
        return;
      }

      // Create summary card
      const summaryCard = document.createElement('div');
      summaryCard.className = 'border border-outline-variant rounded-xl bg-surface-container-low p-md shadow-sm';
      summaryCard.innerHTML = `
        <div class="flex items-center gap-md border-b border-outline-variant pb-md mb-md">
          <div class="p-base bg-secondary-container rounded-lg">
            <span class="material-symbols-outlined text-on-secondary-container" aria-hidden="true">task_alt</span>
          </div>
          <div>
            <h2 class="font-label-md text-on-surface tech-font">Allocation Summary</h2>
            <p class="text-body-sm text-on-surface-variant" id="resultsCount">Results loaded</p>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-md">
          <div class="p-md bg-surface-container-highest/30 rounded-lg border border-outline-variant">
            <p class="text-on-surface-variant text-body-sm font-label-md uppercase text-[10px] tracking-wider">Allotted</p>
            <p class="text-headline-md font-bold text-secondary tech-font" id="allottedCount">0</p>
          </div>
          <div class="p-md bg-surface-container-highest/30 rounded-lg border border-outline-variant">
            <p class="text-on-surface-variant text-body-sm font-label-md uppercase text-[10px] tracking-wider">Waitlist</p>
            <p class="text-headline-md font-bold text-error tech-font" id="waitlistCount">0</p>
          </div>
        </div>
      `;
      
      resultsList.appendChild(summaryCard);

      // Update counts
      document.getElementById('allottedCount').textContent = results.allotted.length;
      document.getElementById('waitlistCount').textContent = results.waitlist.length;
      document.getElementById('resultsCount').textContent = `${results.allotted.length + results.waitlist.length} participants`;

      // Create results table
      const tableContainer = document.createElement('div');
      tableContainer.className = 'overflow-hidden border border-outline-variant rounded-xl bg-surface-container-lowest';
      
      let tableHTML = `
        <div class="bg-surface-container-low px-md py-sm border-b border-outline-variant flex justify-between items-center">
          <h2 class="font-label-md text-on-surface uppercase tracking-widest text-[11px] tech-font">Allotment Details</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-surface-container-low/50 border-b border-outline-variant">
                <th scope="col" class="px-md py-sm text-body-sm font-bold text-on-surface-variant font-label-md uppercase text-[10px]">Name</th>
                <th scope="col" class="px-md py-sm text-body-sm font-bold text-on-surface-variant font-label-md uppercase text-[10px]">Status</th>
                <th scope="col" class="px-md py-sm text-body-sm font-bold text-on-surface-variant font-label-md uppercase text-[10px]">Room</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-outline-variant/30">
      `;

      const allResults = [...(results.allotted || []), ...(results.waitlist || [])];
      allResults.forEach((result) => {
        const statusColor = result.status === 'Allotted' ? 'text-secondary' : 'text-error';
        tableHTML += `
          <tr class="border-b border-outline-variant hover:bg-surface-container-high transition-colors">
            <td class="px-md py-sm text-body-sm text-on-surface">${escapeHtml(result.name)}</td>
            <td class="px-md py-sm text-body-sm ${statusColor} font-semibold">${result.status}</td>
            <td class="px-md py-sm text-body-sm text-on-surface-variant">${escapeHtml(result.room)}</td>
          </tr>
        `;
      });

      tableHTML += `
            </tbody>
          </table>
        </div>
      `;

      tableContainer.innerHTML = tableHTML;
      resultsList.appendChild(tableContainer);

      // Add action buttons
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'space-y-sm';
      actionsDiv.innerHTML = `
        <button id="downloadBtn" 
                class="w-full bg-secondary-container text-on-secondary-container h-14 rounded-xl font-headline-md tech-font shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-xs hover:bg-secondary-container/90 focus:outline-primary focus:outline-2 focus:outline-offset-2" 
                type="button"
                aria-label="Download results as CSV">
          <span class="material-symbols-outlined" aria-hidden="true">download</span>
          Download Results
        </button>
        <button id="clearBtn" 
                class="w-full bg-error-container/20 text-error h-12 rounded-xl font-headline-md tech-font shadow-sm active:scale-[0.98] transition-all flex items-center justify-center gap-xs hover:bg-error-container/30 focus:outline-primary focus:outline-2 focus:outline-offset-2" 
                type="button"
                aria-label="Clear saved results">
          <span class="material-symbols-outlined" aria-hidden="true">delete</span>
          Clear Results
        </button>
      `;

      resultsList.appendChild(actionsDiv);

      // Add event listeners
      document.getElementById('downloadBtn').addEventListener('click', () => downloadResults(results));
      document.getElementById('clearBtn').addEventListener('click', () => clearResults());
    }

    /**
     * Download results as CSV
     */
    function downloadResults(results) {
      const allResults = [...(results.allotted || []), ...(results.waitlist || [])];
      let csv = 'Name,Status,Room,Gender,Department,Year\n';
      
      allResults.forEach((result) => {
        csv += `"${result.name}","${result.status}","${result.room}","${result.gender || ''}","${result.department || ''}","${result.year || ''}"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `allocation-results-${new Date().toISOString().split('T')[0]}.csv`;
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
      document.body.removeChild(a);
    }

    /**
     * Clear saved results
     */
    function clearResults() {
      if (confirm('Are you sure you want to clear all saved results?')) {
        localStorage.removeItem('allocationResults');
        location.reload();
      }
    }

    /**
     * Escape HTML special characters
     */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
